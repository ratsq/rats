<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>RATS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #000;
      min-height: 100vh;
      font-family: 'Arial', 'Helvetica', sans-serif;
    }

    .main-content {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000;
      padding: 1.2rem;
    }

    .core {
      max-width: 800px;
      width: 100%;
      background: #000;
      text-align: center;
      padding: 1.8rem 1rem 2.8rem;
      margin: 0 auto;
    }

    .title-block {
      display: inline-block;
      width: auto;
      margin-bottom: 1.8rem;
    }

    .album-title {
      font-size: clamp(3rem, 13vw, 5.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      font-family: 'Arial', 'Helvetica', sans-serif;
      background: #000;
      line-height: 1;
      display: block;
      padding-bottom: 0.2rem;
      border-bottom: 2px solid #fff;
      width: fit-content;
      margin: 0 auto;
    }

    .track-count {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 3px;
      color: #aaa;
      text-transform: uppercase;
      font-family: 'Arial', 'Helvetica', sans-serif;
      background: #000;
      display: block;
      margin-top: 0.6rem;
      padding-bottom: 0.2rem;
      border-bottom: 4px solid #fff;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }

    .image-frame {
      margin: 0 auto 2.2rem;
      max-width: 540px;
      width: 100%;
      background: #000;
      border: 1px solid #1f1f1f;
      padding: 0.6rem;
    }

    .rats-visual {
      width: 100%;
      max-width: 480px;
      height: auto;
      display: block;
      margin: 0 auto;
      image-rendering: crisp-edges;
      background: #000;
    }

    .countdown-area {
      margin-top: 1.2rem;
      border-top: 1px solid #171717;
      padding-top: 1.8rem;
    }

    .timer-raw {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      row-gap: 1.4rem;
    }

    .time-slot {
      background: #000;
      border: 1px solid #2a2a2a;
      min-width: 75px;
      padding: 0.5rem 0.2rem;
      text-align: center;
    }

    .num {
      font-size: 2.8rem;
      font-weight: 700;
      font-family: 'Arial', 'Helvetica', sans-serif;
      color: #fff;
      line-height: 1;
      margin-bottom: 0.2rem;
    }

    .unit {
      font-size: 0.6rem;
      text-transform: uppercase;
      color: #6a6a6a;
      letter-spacing: 1.5px;
      font-family: 'Arial', 'Helvetica', sans-serif;
    }

    .released-state {
      font-size: 1.6rem;
      font-weight: 600;
      color: #fff;
      border: 1px solid #fff;
      display: inline-block;
      padding: 0.6rem 1.6rem;
      background: #000;
      letter-spacing: 1px;
      font-family: 'Arial', 'Helvetica', sans-serif;
      margin-top: 0.3rem;
    }

    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-container {
      max-width: 90%;
      max-height: 90%;
      background: #000;
    }

    video {
      width: 100%;
      max-height: 80vh;
      outline: none;
      border: none;
      display: block;
      pointer-events: none;  /* no pause, no skip, no controls */
    }

    .bg-audio {
      display: none;
    }
  </style>
</head>
<body>
<!-- VIDEO OVERLAY - will attempt unmute automatically -->
<div id="videoOverlay" class="video-overlay">
  <div class="video-container">
    <video id="introVideo" playsinline disableRemotePlayback preload="auto">
      <source src="https://www.image2url.com/r2/default/videos/1781298229375-64a53a12-3bfc-493c-8d74-7cf46eaf0745.mov" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</div>

<!-- MAIN WEBSITE (hidden until video ends) -->
<div id="mainContent" class="main-content">
  <div class="core">
    <div class="title-block">
      <span class="album-title">RATS</span>
      <span class="track-count">20 SONGS</span>
    </div>
    <div class="image-frame">
      <img id="albumImg" class="rats-visual" alt="RATS" src="">
    </div>
    <div class="countdown-area">
      <div class="timer-raw" id="timerGrid">
        <div class="time-slot"><div class="num" id="days">00</div><div class="unit">DAYS</div></div>
        <div class="time-slot"><div class="num" id="hours">00</div><div class="unit">HOURS</div></div>
        <div class="time-slot"><div class="num" id="minutes">00</div><div class="unit">MIN</div></div>
        <div class="time-slot"><div class="num" id="seconds">00</div><div class="unit">SEC</div></div>
      </div>
    </div>
  </div>
</div>

<audio id="bgAudio" class="bg-audio" loop preload="auto">
  <source src="https://www.image2url.com/r2/default/audio/1781297944499-0cfa2f59-b3cd-4b93-b16c-3cac8000f31e.m4a" type="audio/mp4">
</audio>

<script>
  (function() {
    // Image sequence
    const imageUrls = [
      "https://media.discordapp.net/attachments/1317858604866338816/1512123538767872195/F3CCDBE4-FC50-43B7-9E97-D1BB7B3B2E23.png?ex=6a263e09&is=6a24ec89&hm=41538bd7d0f8c7d2670bebfa3cf69b96ab8ea5fae031a86df3a3d9dcb3ce68d0&=&format=webp&quality=lossless&width=350&height=350",
      "https://cdn.discordapp.com/attachments/1317858604866338816/1512123550176248009/349760AE-B88D-465E-B923-A09404DE8025.png?ex=6a263e0c&is=6a24ec8c&hm=626cbe48cd659105712d592ef748d8701c58e269514dc263e1c5002512d63fc9&",
      "https://media.discordapp.net/attachments/1317858604866338816/1512123553523175445/DAB5FACE-F523-43DA-8D3D-99ACF203038D.png?ex=6a263e0d&is=6a24ec8d&hm=8914a71d2a70d46507c81e224cf766afe844a90193cb1d0a4d79289d725cd40a&=&format=webp&quality=lossless&width=1008&height=1008",
      "https://media.discordapp.net/attachments/1317858604866338816/1512123556396273845/FFADA6C3-4FD9-41E7-9A11-C5D1C4AC0257.png?ex=6a263e0d&is=6a24ec8d&hm=91f8ffdc0387fd86b76e59fb8cca0708e83a05e480ee78835acd8c4456690e18&=&format=webp&quality=lossless&width=1008&height=1008"
    ];

    let currentIndex = 0;
    let imageInterval = null;
    const imgElement = document.getElementById('albumImg');

    function preloadImages() {
      imageUrls.forEach(url => { new Image().src = url; });
    }

    function startImageLoop() {
      if (!imgElement) return;
      imgElement.src = imageUrls[0];
      currentIndex = 0;
      if (imageInterval) clearInterval(imageInterval);
      imageInterval = setInterval(() => {
        currentIndex = (currentIndex + 1) % imageUrls.length;
        if (imgElement) imgElement.src = imageUrls[currentIndex];
      }, 700);
    }

    // Countdown to July 3, 2026
    const targetDate = new Date(2026, 6, 3, 0, 0, 0);
    let countdownInterval = null;

    function updateCountdown() {
      const daysSpan = document.getElementById('days');
      const hoursSpan = document.getElementById('hours');
      const minutesSpan = document.getElementById('minutes');
      const secondsSpan = document.getElementById('seconds');
      const timerContainer = document.getElementById('timerGrid');
      if (!daysSpan) return;

      const now = new Date();
      const diffMs = targetDate - now;
      if (diffMs <= 0) {
        if (countdownInterval) clearInterval(countdownInterval);
        if (timerContainer && !document.getElementById('releasedMsg')) {
          timerContainer.innerHTML = '';
          const releasedDiv = document.createElement('div');
          releasedDiv.id = 'releasedMsg';
          releasedDiv.className = 'released-state';
          releasedDiv.textContent = 'RELEASED';
          timerContainer.appendChild(releasedDiv);
        }
        return;
      }
      const totalSec = Math.floor(diffMs / 1000);
      const days = Math.floor(totalSec / 86400);
      const hours = Math.floor((totalSec % 86400) / 3600);
      const mins = Math.floor((totalSec % 3600) / 60);
      const secs = totalSec % 60;
      daysSpan.textContent = days < 10 ? '0' + days : days;
      hoursSpan.textContent = hours < 10 ? '0' + hours : hours;
      minutesSpan.textContent = mins < 10 ? '0' + mins : mins;
      secondsSpan.textContent = secs < 10 ? '0' + secs : secs;
    }

    function startCountdown() {
      updateCountdown();
      if (countdownInterval) clearInterval(countdownInterval);
      countdownInterval = setInterval(updateCountdown, 1000);
    }

    // Background song
    function initAudio() {
      const audio = document.getElementById('bgAudio');
      if (!audio) return;
      audio.volume = 0.7;
      audio.loop = true;
      audio.play().catch(e => console.log("audio autoplay after video ends might be blocked"));
    }

    // Video overlay logic with automatic unmute
    const overlay = document.getElementById('videoOverlay');
    const mainContent = document.getElementById('mainContent');
    const video = document.getElementById('introVideo');

    function closeVideoAndShowSite() {
      if (!overlay) return;
      overlay.style.display = 'none';
      mainContent.style.display = 'flex';
      startImageLoop();
      startCountdown();
      initAudio();
    }

    if (video) {
      // When video ends, close overlay
      video.addEventListener('ended', function() {
        closeVideoAndShowSite();
      });
      video.addEventListener('error', function() {
        setTimeout(closeVideoAndShowSite, 2000);
      });

      // Force unmute automatically
      video.muted = true;   // start muted so it plays
      let playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          // Video is playing muted. Now unmute and play again with sound.
          video.muted = false;
          video.play().catch(e => console.log("Unmuted autoplay blocked by browser"));
        }).catch(() => {
          // Even muted play failed, but try unmuted anyway
          video.muted = false;
          video.play().catch(e => console.log("Autoplay completely blocked"));
        });
      } else {
        video.muted = false;
        video.play();
      }
    } else {
      setTimeout(closeVideoAndShowSite, 100);
    }

    preloadImages();
  })();
</script>
</body>
</html>
